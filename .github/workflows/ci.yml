name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify (typecheck · lint · test)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rescuebite_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Test database + secrets. These are throwaway CI values, not secrets.
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/rescuebite_test?schema=public
      JWT_SECRET: ci-jwt-secret-not-for-production-use
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Turborepo cache
        uses: actions/cache@v4
        with:
          path: |
            .turbo
            node_modules/.cache/turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Apply database migrations
        run: pnpm --filter @rescuebite/api exec prisma migrate deploy

      - name: Generate Prisma client
        run: pnpm --filter @rescuebite/api exec prisma generate

      # Single gate: typecheck + lint + test across the monorepo (Turbo-cached).
      - name: Verify
        run: pnpm verify
